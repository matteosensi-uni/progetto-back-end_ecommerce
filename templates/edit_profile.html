
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Profilo{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width: 700px;">
    
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Il tuo profilo</h2>

        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}

            <a class="text-decoration-none" href="{% url 'password_change' %}">Modifica Password</a>

            <button class="btn btn-primary w-100 mt-3">
                Salva modifiche
            </button>
        </form>
    </div>

</div>

{% endblock %}
