<div class="card shadow-sm h-100">
    <img src="https://placehold.co/600x400?text=." class="card-img-top">
    <div class="card-body d-flex flex-column">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <div class="mt-auto">
            <div class="d-flex mb-3 mt-2 gap-2 flex-wrap">
                {% for category in product.categories.all %}
                    <a href="{% url "tag_detail" category.pk %}" class="badge text-bg-primary text-decoration-none">
                        {{ category.name }}
                    </a>
                {% endfor %}
            </div>
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <div class="btn-group">
                    <a href="{% url "product_detail" product.pk product.slug  %}" class="btn btn-sm btn-outline-primary">Apri</a>
                </div>
                {% if product.discount %}
                    <p style="margin:8px 0 0 auto;">
                        <s>{{ product.price }}€</s>
                        <strong class="text-danger">
                            {{ product.final_price|floatformat:2 }}€
                        </strong>
                    </p>
                {% else %}
                    <p style="margin:8px 0 0 auto;">{{ product.price }}€</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
