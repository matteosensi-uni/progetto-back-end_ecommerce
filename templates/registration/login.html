{% extends "registration/base_registration.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Login</h2>

<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-primary w-100 mt-3">
        Accedi
    </button>
</form>
<a href="{% url 'signup' %}" class="btn btn-secondary w-100 mt-3">
    Registrati
</a>
<a class="text-decoration-none mt-2" href="{% url 'password_reset' %}">Password Dimenticata?</a>
{% endblock %}
