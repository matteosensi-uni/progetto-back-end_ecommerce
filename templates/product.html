{% extends 'base.html' %}

{% block title %}Prodotti{% endblock title %}

{% block content %}
<div class="album py-3">
    <div class="container">
        <h2 class="mb-4">Tutti i nostri prodotti!</h2>
        
        <form method="get" class="mb-4 p-1">

            <div class="row g-2 align-items-end border rounded-3 border-secondary" style="padding: 0 16px 16px 16px">

                <div class="col-md-4">
                    <label class="form-label">Cerca</label>
                    <input type="text" name="q" class="form-control" placeholder="Nome prodotto..." value="{{ request.GET.q }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Categoria</label>
                    
                    <select name="category" class="form-select">
                        <option value="">Tutte</option>

                        {% for cat in categories %}
                            <option value="{{ cat.id }}"
                                {% if request.GET.category == cat.id|stringformat:"s" %}
                                    selected
                                {% endif %}
                            >
                                {{ cat.name }}
                            </option>
                        {% endfor %}

                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Prezzo min</label>
                    <input type="number" step="0.01"name="min_price" class="form-control" value="{{ request.GET.min_price }}" >
                </div>
                <div class="col-md-2">
                    <label class="form-label">Prezzo max</label>
                    <input type="number" step="0.01"name="max_price" class="form-control" value="{{ request.GET.max_price }}" >
                </div>
                <div class="col-md-1 d-grid">
                    <button class="btn btn-primary">
                        Filtra
                    </button>
                </div>
            </div>
        </form>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 g-3">
            {% for product in object_list %}
                <div class = "col">            
                {% include "includes/product_card_manager.html" %}
                </div>
            {% empty %}
                <p>Nessun articolo trovato</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock content %}
