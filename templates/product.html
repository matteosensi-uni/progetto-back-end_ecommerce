{% extends 'base.html' %}

{% block title %}Prodotti{% endblock title %}

{% block content %}
<div class="album py-3">
    <div class="container">
        <h2 class="mb-4">Tutti i nostri prodotti!</h2>
        <!-- form per la ricerca -->
        <form method="get" class="mb-4 p-1 rounded-3 border border-secondary">
            <div class="row g-2 align-items-end p-2 pt-0">
                <div class="col-md-4">
                    <label class="form-label">Cerca</label>
                    <input type="text" name="name" class="form-control" placeholder="Nome prodotto..." value="{{ request.GET.q }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Categoria</label>
                    <select name="category" class="form-select">
                        <option value="">Tutte</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if request.GET.category == cat.id|stringformat:"s" %} selected {% endif %}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Prezzo min</label>
                    <input type="number" step="0.01"name="min_price" class="form-control" value="{{ request.GET.min_price }}" >
                </div>
                <div class="col-md-2">
                    <label class="form-label">Prezzo max</label>
                    <input type="number" step="0.01"name="max_price" class="form-control" value="{{ request.GET.max_price }}" >
                </div>
                <div class="col-md-1 d-grid">
                    <button class="btn btn-primary">
                        Cerca
                    </button>
                </div>
            </div>
        </form>
        <!-- lista prodotti -->
        <div class="row g-3">
            {% for product in products %}
            <div class = "col-md-6 col-lg-4">            
                {% include "includes/product_card.html" with show_actions=True %}
            </div>
            {% empty %}
            <div class="alert alert-info text-center shadow-sm">
                Nessun Risultato!
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock content %}
